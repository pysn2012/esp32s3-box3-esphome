---
substitutions:
  name: esp32-s3-box-3
  friendly_name: ESP32 S3 Box 3

  # 允许显示的字符集。此列表非常庞大，包含了多语言字符。
  allowed_characters: |-
    测试一二三四五六七八九十百千万亿温度湿电池量压·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?
  
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0  # 要求的最低ESPHome版本
  name_add_mac_suffix: true  # 设备名后缀添加MAC地址，避免冲突
  on_boot:  # 开机启动逻辑
    priority: 600
    then:
      - light.turn_on: led  # 开机点亮屏幕

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 20                        # 字号：24
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错

# 屏幕背光控制 (GPIO47)
output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

# 传感器
sensor:
  - platform: aht10
    i2c_id: bus_b
    variant: AHT20
    temperature:
      name: "S3 Temperature"
      id: s3temp
      on_value:
        - lvgl.label.update:
            id: lbl_temp
            text:
              format: "温度: %.1f℃"
              args: [ 'x' ]
    humidity:
      name: "S3 Humidity"
      id: s3humi
      on_value:
        - lvgl.label.update:
            id: lbl_humi
            text:
              format: "湿度: %.1f%%"
              args: [ 'x' ]
    update_interval: 30s

  - platform: adc
    pin: GPIO10
    id: battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: "voltage"
    entity_category: "diagnostic"
    disabled_by_default: true
    update_interval: 30s
    attenuation: auto
    filters:
      - multiply: 4.11

  - platform: copy
    id: battery_percent
    source_id: battery_voltage
    name: "Battery level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: "battery"
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: lbl_battery_pct
          text:
            format: "电量: %.0f%%"
            args: [ 'x' ]
    filters:
      - lambda: return (x - 2.7) / (4.2 - 2.7) * 100;
      - clamp:
          min_value: 0
          max_value: 100

  - platform: copy
    source_id: battery_voltage
    id: battery_voltage_copy
    name: "Battery Voltage Display"
    internal: true
    accuracy_decimals: 2
    on_value:
      - lvgl.label.update:
          id: lbl_voltage
          text:
            format: "电压: %.2fV"
            args: [ 'x' ]

  - platform: wifi_signal
    name: "WiFi db"
    id: wifi_signal_db
    update_interval: 30s

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal"
    id: wifi_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"

# I2C总线 (用于触摸屏等)
i2c:
  - id: bus_a
    scl: GPIO18
    sda: GPIO8
  - id: bus_b
    sda: GPIO41
    scl: GPIO40

# SPI总线 (用于驱动屏幕)
spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

# 显示屏 (Display): 配置ILI9XXX系列屏幕（S3BOX型号）
display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    auto_clear_enabled: false

# 触摸屏
touchscreen:
  - platform: gt911
    i2c_id: bus_a
    address: 0x5D
    id: gt911_touchscreen
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true

# LVGL 配置
lvgl:
  displays:
    - s3_box_lcd
  touchscreens:
    - gt911_touchscreen
  byte_order: little_endian
  buffer_size: 25%
  default_font: cn_font

  # 全局主题：黑底白字
  theme:
    dark_mode: true

  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:
        - tabview:
            id: main_tabview
            position: BOTTOM
            size: 40px
            bg_color: 0x000000
            border_width: 0

            # 标签栏样式（底部按钮）
            tab_style:
              bg_color: 0x1a1a1a
              border_width: 0
              pad_all: 0
              items:
                bg_color: 0x1a1a1a
                text_color: 0x888888
                pressed:
                  bg_color: 0x333333
                  text_color: 0xFFFFFF
                checked:
                  bg_color: 0x000000
                  text_color: 0xFFFFFF
                  border_width: 2
                  border_color: 0xFFFFFF
                  border_side: [TOP]

            # 内容区域样式
            content_style:
              bg_color: 0x000000
              pad_all: 8px

            tabs:
              # ===== 标签页 1：温湿度 =====
              - name: "环境"
                id: tab_env
                widgets:
                  - obj:
                      width: 100%
                      height: 100%
                      bg_color: 0x000000
                      border_width: 0
                      layout:
                        type: flex
                        flex_flow: COLUMN
                        flex_align_main: CENTER
                        flex_align_cross: CENTER
                        pad_row: 24px
                      widgets:
                        - label:
                            id: lbl_temp
                            text: "温度: --.-℃"
                            text_font: cn_font
                            text_color: 0xFFFFFF
                        - label:
                            id: lbl_humi
                            text: "湿度: --.-%%"
                            text_font: cn_font
                            text_color: 0xFFFFFF

              # ===== 标签页 2：电池 =====
              - name: "电池"
                id: tab_battery
                widgets:
                  - obj:
                      width: 100%
                      height: 100%
                      bg_color: 0x000000
                      border_width: 0
                      layout:
                        type: flex
                        flex_flow: COLUMN
                        flex_align_main: CENTER
                        flex_align_cross: CENTER
                        pad_row: 24px
                      widgets:
                        - label:
                            id: lbl_voltage
                            text: "电压: --.--V"
                            text_font: cn_font
                            text_color: 0xFFFFFF
                        - label:
                            id: lbl_battery_pct
                            text: "电量: --%%"
                            text_font: cn_font
                            text_color: 0xFFFFFF