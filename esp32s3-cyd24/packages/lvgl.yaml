lvgl:
  displays:
    - tft_display
  touchscreens:
    - touchscreen_id: tft_touch
  buffer_size: 100%
  # =====顶层页面=====
  top_layer:
    widgets:    
      # 显示时间（顶部居中）
      - label:
          text: "----/--/-- --:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column
        flex_align_main: start        # 主轴：从顶部开始排列
        flex_align_cross: stretch     # 交叉轴：子元素宽度拉伸填满
        flex_align_track: start
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 36
      pad_bottom: 8
      pad_left: 10
      pad_right: 10
      
      widgets:        
        # 中部信息区 - 纯文字，无容器无底色
        - label:
            id: outdoor_info
            text: "室外：--℃/--%"
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: center
            pad_top: 20
            pad_bottom: 6
        - label:
            id: indoor_info
            text: "室内：--℃/--%"
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: center
            pad_top: 6
            pad_bottom: 6
        - label:
            id: weather_alert_text
            text: "预警：加载中..."
            text_color: 0xFF8C00
            text_font: cn_font
            text_align: center
            pad_top: 6
            pad_bottom: 20

        # 底部按钮区
        - button:
            height: 50px
            width: 50px
            radius: $radius
            styles: control
            pad_top: 10
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  text: $socket
            on_click:
              - lvgl.page.show: extras_page

    # 附加控制页面
    - id: extras_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        # 按钮：主页（回到主页面）
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: extras_back_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "主页"
                  text_font: cn_font
            on_click:
              - lvgl.page.show: main_page

       # 按钮：插座1
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket1_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket1_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket1_label
                  text: "插座1"
                  text_font: cn_font
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1

        # 按钮：插座2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket2_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket2_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket2_label
                  text: "插座2"
                  text_font: cn_font
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1

        # 按钮：插座3
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket3_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket3_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket3_label
                  text: "插座3"
                  text_font: cn_font
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1


